name: Build All

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true 
  DOTNET_CLI_TELEMETRY_OPTOUT: 1 
  DOTNET_NOLOGO: 1

jobs:

  build-38:
    uses: ./.github/workflows/build.yml
    with:
      electron: 38
      build-all: true

  build-39:
    uses: ./.github/workflows/build.yml
    with:
      electron: 39
      build-all: true

  build-40:
    uses: ./.github/workflows/build.yml
    with:
      electron: 40
      build-all: true

  build-41:
    uses: ./.github/workflows/build.yml
    with:
      electron: 41
      build-all: true

  build-42:
    uses: ./.github/workflows/build.yml
    with:
      electron: 42
      build-all: true

  build-43:
    uses: ./.github/workflows/build.yml
    with:
      electron: 43
      build-all: true

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: [build-38, build-39, build-40, build-41, build-42, build-43]
    timeout-minutes: 20
    strategy:
      fail-fast: false

    name: upload artifcts
    if: success()
    steps:

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          pattern: win32-electron-edge-js*

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          pattern: darwin-electron-edge-js*

      - name: Upload artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: electron-edge-js
          pattern: '*electron-edge-js*'
          delete-merged: true
  
